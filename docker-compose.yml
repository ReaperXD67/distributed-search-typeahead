name: search-typeahead

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-typeahead}
      POSTGRES_USER: ${POSTGRES_USER:-typeahead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typeahead}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-typeahead} -d ${POSTGRES_DB:-typeahead}"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis-a:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-a-data:/data
    healthcheck: &redis-health
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  redis-b:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-b-data:/data
    healthcheck: *redis-health

  redis-c:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-c-data:/data
    healthcheck: *redis-health

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://typeahead:typeahead@postgres:5432/typeahead}
      REDIS_URLS: ${REDIS_URLS:-redis://redis-a:6379/0,redis://redis-b:6379/0,redis://redis-c:6379/0}
      DATASET_PATH: /app/data/queries.csv
      BATCH_SIZE: ${BATCH_SIZE:-250}
      BATCH_FLUSH_INTERVAL_MS: ${BATCH_FLUSH_INTERVAL_MS:-2000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      TRENDING_WINDOW_MINUTES: ${TRENDING_WINDOW_MINUTES:-60}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis-a:
        condition: service_healthy
      redis-b:
        condition: service_healthy
      redis-c:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres-data:
  redis-a-data:
  redis-b-data:
  redis-c-data:

